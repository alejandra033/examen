name: Reusable build workflow

on:
  workflow_call:
    inputs:
      run_frontend:
        required: true
        type: boolean
      run_backend:
        required: true
        type: boolean
      run_infrastructure:
        required: true
        type: boolean

jobs:
  build-frontend:
    if: ${{ inputs.run_frontend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Build frontend
        run: |
          echo "Building frontend component..."
          echo "Replace this with npm/yarn build steps for frontend."

  build-backend:
    if: ${{ inputs.run_backend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Build backend
        run: |
          echo "Building backend component..."
          echo "Replace this with backend compile or package commands."

  plan-infrastructure:
    if: ${{ inputs.run_infrastructure == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Plan infrastructure
        run: |
          echo "Running infrastructure planning steps..."
          echo "Replace this with Terraform/ARM/CloudFormation plan commands."
